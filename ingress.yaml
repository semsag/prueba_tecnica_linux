apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stratio-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: stratio.test # Este será nuestro "dominio" falso
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: stratio-service # Debe coincidir con el nombre de tu Service
            port:
              number: 80
